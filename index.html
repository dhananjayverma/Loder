<!DOCTYPE html>
<html>
<head>
<title>CUIMS Circular Loader</title>
</head>

<body style="margin:0;font-family:Arial,sans-serif;overflow:hidden;">

<!-- LOADER -->
<div id="loader" style="
position:fixed;
inset:0;
z-index:9999;
background:
linear-gradient(rgba(8,18,40,.45),rgba(8,18,40,.50)),
url('your-campus-bg.jpg') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
">

  <div id="flyArea" style="position:absolute;inset:0;"></div>

  <div id="mainCore" style="
  width:360px;
  height:300px;
  background:transparent;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
  ">

    <div class="logoBadge" style="
    position:relative;
    width:250px;
    height:250px;
    display:flex;
    align-items:center;
    justify-content:center;
    animation:logoSpin 3.2s linear infinite;
    ">
      <img src="log.png" alt="CUIMS" style="
      width:100%;
      height:100%;
      object-fit:contain;
      object-position:center;
      display:block;
      filter:drop-shadow(0 14px 18px rgba(0,0,0,.26));
      ">
    </div>

    <div class="brandText" style="
    position:relative;
    margin-top:2px;
    font-size:28px;
    line-height:1;
    font-weight:900;
    letter-spacing:1px;
    white-space:nowrap;
    color:#ffffff;
    -webkit-text-stroke:1px rgba(255,255,255,.35);
    text-shadow:
      0 2px 4px rgba(0,0,0,.65),
      0 0 18px rgba(239,29,34,.55),
      0 0 28px rgba(255,138,29,.38);
    filter:drop-shadow(0 12px 22px rgba(0,0,0,.42));
    animation:textGlow 1.8s ease-in-out infinite alternate;
    ">
      Welcome to CUIMS Portal
    </div>
  </div>

  <div class="progressWrap" style="
  position:absolute;
  left:50%;
  bottom:92px;
  transform:translateX(-50%);
  width:430px;
  ">
    <div style="
    display:flex;
    justify-content:space-between;
    color:white;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
    ">
      <span id="status">Opening CUIMS Portal...</span>
      <span id="percent">0%</span>
    </div>

    <div style="
    height:12px;
    background:rgba(255,255,255,.23);
    border-radius:30px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.34);
    ">
      <div id="bar" style="
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#ef1d22,#ff3b3f,#ff8a1d);
      border-radius:30px;
      transition:.35s;
      box-shadow:0 0 20px rgba(239,29,34,.85);
      "></div>
    </div>
  </div>

</div>

<!-- YOUR WEBSITE CONTENT -->
<div id="website" style="display:none;">
  <!-- apna original website code yaha paste karo -->
  <div style="
  height:100vh;
  background:url('your-campus-bg.jpg') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:40px;
  font-weight:900;
  ">
    CUIMS Website Opened
  </div>
</div>

<style>
@keyframes flyToCore {
  0% {
    transform:translate(var(--x), var(--y)) scale(1) rotate(var(--r));
    opacity:0;
  }
  12% {
    opacity:1;
  }
  78% {
    opacity:1;
  }
  100% {
    transform:translate(calc(50vw - 38px), calc(50vh - 18px)) scale(.10) rotate(20deg);
    opacity:0;
  }
}

@keyframes corePulse {
  0%,100% {
    transform:scale(1);
  }
  50% {
    transform:scale(1.08);
  }
}

@keyframes rotateRing {
  from {
    transform:rotate(0deg);
  }
  to {
    transform:rotate(360deg);
  }
}

@keyframes logoSpin {
  from {
    transform:rotate(0deg);
  }
  to {
    transform:rotate(360deg);
  }
}

@keyframes gradientText {
  0% {
    background-position:0% 50%;
  }
  100% {
    background-position:300% 50%;
  }
}

@keyframes textGlow {
  from {
    text-shadow:
      0 2px 4px rgba(0,0,0,.70),
      0 0 14px rgba(239,29,34,.55),
      0 0 24px rgba(255,138,29,.36);
  }
  to {
    text-shadow:
      0 2px 5px rgba(0,0,0,.78),
      0 0 24px rgba(255,255,255,.78),
      0 0 36px rgba(255,59,63,.70),
      0 0 46px rgba(255,138,29,.55);
  }
}

@keyframes readyPop {
  0% {
    transform:scale(.8);
    opacity:0;
  }
  100% {
    transform:scale(1);
    opacity:1;
  }
}

@media (max-width:520px) {
  #mainCore {
    width:300px !important;
    height:270px !important;
  }

  .logoBadge {
    width:210px !important;
    height:210px !important;
  }

  .brandText {
    font-size:21px !important;
    letter-spacing:0 !important;
  }

  .progressWrap {
    width:calc(100vw - 48px) !important;
    bottom:64px !important;
  }
}
</style>

<script>
const flyArea = document.getElementById("flyArea");
const mainCore = document.getElementById("mainCore");
const statusText = document.getElementById("status");
const percent = document.getElementById("percent");
const bar = document.getElementById("bar");
const loader = document.getElementById("loader");
const website = document.getElementById("website");

let loaded = 0;
let progress = 0;

const items = [
  "Attendance",
  "Resources",
  "Assessment",
  "Feeds",
  "Students",
  "Faculty",
  "Results",
  "Login"
];

const gradients = [
  "linear-gradient(135deg,#ef1d22,#ff6b35)",
  "linear-gradient(135deg,#1d4ed8,#38bdf8)",
  "linear-gradient(135deg,#16a34a,#5eead4)",
  "linear-gradient(135deg,#7c3aed,#c084fc)",
  "linear-gradient(135deg,#f97316,#facc15)",
  "linear-gradient(135deg,#0f172a,#334155)"
];

function createFlyingItem(){
  const item = document.createElement("div");
  item.innerText = items[Math.floor(Math.random() * items.length)];

  item.style.position = "absolute";
  item.style.left = "0";
  item.style.top = "0";
  item.style.padding = "10px 16px";
  item.style.borderRadius = "999px";
  item.style.background = gradients[Math.floor(Math.random() * gradients.length)];
  item.style.border = "1px solid rgba(255,255,255,.45)";
  item.style.color = "#fff";
  item.style.fontSize = "12px";
  item.style.fontWeight = "900";
  item.style.boxShadow = "0 14px 35px rgba(0,0,0,.26),0 0 22px rgba(255,255,255,.18)";
  item.style.whiteSpace = "nowrap";
  item.style.letterSpacing = ".2px";

  const startX = window.innerWidth / 2 - 310 + Math.random() * 620;
  const startY = window.innerHeight / 2 - 330 + Math.random() * 145;
  const rotate = (Math.random() * 44 - 22) + "deg";

  item.style.setProperty("--x", startX + "px");
  item.style.setProperty("--y", startY + "px");
  item.style.setProperty("--r", rotate);

  item.style.animation = "flyToCore 1.35s cubic-bezier(.45,.02,.18,1) forwards";

  flyArea.appendChild(item);

  setTimeout(() => {
    item.remove();
    loaded++;

    mainCore.style.animation = "corePulse .32s ease";
    setTimeout(() => mainCore.style.animation = "", 320);
  }, 1250);
}

const flyTimer = setInterval(createFlyingItem, 280);

const progressTimer = setInterval(() => {
  progress += Math.floor(Math.random() * 4) + 2;

  if(progress >= 100){
    progress = 100;
    clearInterval(flyTimer);
    clearInterval(progressTimer);

    statusText.innerText = "CUIMS Ready";

    mainCore.innerHTML = `
      <div style="
      position:relative;
      width:98px;
      height:98px;
      border-radius:50%;
      background:linear-gradient(135deg,#22c55e,#16a34a,#5eead4);
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      font-size:54px;
      font-weight:900;
      box-shadow:
        0 16px 35px rgba(34,197,94,.45),
        0 0 50px rgba(34,197,94,.45);
      animation:readyPop .45s ease;
      ">
        ✓
      </div>
    `;

    setTimeout(() => {
      loader.style.transition = "opacity .75s ease";
      loader.style.opacity = "0";
    }, 1100);

    setTimeout(() => {
      loader.style.display = "none";
      website.style.display = "block";
      document.body.style.overflow = "auto";
    }, 1900);
  }

  bar.style.width = progress + "%";
  percent.innerText = progress + "%";

  if(progress < 30) statusText.innerText = "Loading login interface...";
  else if(progress < 60) statusText.innerText = "Importing academic modules...";
  else if(progress < 85) statusText.innerText = "Connecting campus services...";
  else statusText.innerText = "Finalizing CUIMS...";
}, 420);
</script>

</body>
</html>
