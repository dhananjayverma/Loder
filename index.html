<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CUIMS Circular Loader</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- LOADER -->
  <div id="loader">
    <div class="bg-blur"></div>
    <div class="bg-overlay"></div>
    <div id="flyArea"></div>

    <div id="mainCore">
      <div class="logoBadge">
        <div class="logoOuter">
          <img src="ring1.png" alt="" class="ring-img">
        </div>
        <div class="logoCenter">
          <div class="center-img-wrap">
            <img src="cent1.png" alt="CUIMS" class="center-img">
          </div>
        </div>
      </div>
      <div class="brandText">
        Welcome to CUIMS Portal
      </div>
    </div>

    <div class="progressWrap">
      <div class="progress-header">
        <span id="status">Opening CUIMS Portal...</span>
        <span id="percent">0%</span>
      </div>
      <div class="progress-track">
        <div id="bar"></div>
      </div>
    </div>
  </div>

  <!-- YOUR WEBSITE CONTENT -->
  <div id="website">
    <div class="website-content">
      CUIMS Website Opened
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
